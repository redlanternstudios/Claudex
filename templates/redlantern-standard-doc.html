<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    @page { size: Letter; margin: 0.58in; }
    :root {
      --ink: #151515;
      --muted: #5f5b57;
      --line: #d8d1c8;
      --red: #8f1f22;
      --gold: #b6843e;
      --paper: #fbfaf7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 10.5pt;
      line-height: 1.46;
    }
    .doc { max-width: 820px; margin: 0 auto; }
    header {
      border-bottom: 2px solid var(--red);
      padding-bottom: 18px;
      margin-bottom: 24px;
    }
    .brand {
      color: var(--red);
      font-size: 9pt;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 12px 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 29pt;
      line-height: 1.02;
      font-weight: 700;
    }
    .subtitle { color: var(--muted); font-size: 11.5pt; max-width: 680px; }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
      padding: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .meta b { display: block; color: var(--red); font-size: 8pt; text-transform: uppercase; }
    section { break-inside: avoid; margin: 22px 0; }
    h2 {
      margin: 0 0 8px;
      color: var(--red);
      font-size: 13pt;
      text-transform: uppercase;
      letter-spacing: .04em;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }
    h3 { margin: 12px 0 4px; font-size: 10.5pt; color: #2b2927; }
    p { margin: 0 0 9px; }
    ul { margin: 6px 0 0 18px; padding: 0; }
    li { margin: 4px 0; }
    .callout {
      border-left: 4px solid var(--gold);
      background: #fff;
      padding: 11px 13px;
      margin: 12px 0;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .box {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      min-height: 72px;
    }
    .truth {
      font-family: Menlo, Consolas, monospace;
      font-size: 8.7pt;
      background: #fff;
      border: 1px solid var(--line);
      padding: 10px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    footer {
      margin-top: 26px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 8.5pt;
    }
  </style>
</head>
<body>
  <main class="doc">
    <header>
      <div class="brand">RedLantern Studios · www.byredllc.com · San Diego, California</div>
      <h1>{{TITLE}}</h1>
      <div class="subtitle">{{SUBTITLE}}</div>
      <div class="meta">
        <div><b>Owner</b>{{OWNER}}</div>
        <div><b>Prepared</b>{{PREPARED_DATE}}</div>
        <div><b>Status</b>{{STATUS}}</div>
        <div><b>Source</b>{{SOURCE}}</div>
      </div>
    </header>

    {{BODY}}

    <footer>
      RedLantern standard document. Claims require receipts. Unknowns stay labeled until verified.
    </footer>
  </main>
</body>
</html>
